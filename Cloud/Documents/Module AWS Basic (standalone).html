document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  .awsmod ::-webkit-scrollbar{width:10px;height:10px}\n  .awsmod ::-webkit-scrollbar-thumb{background:rgba(120,140,200,.3);border-radius:8px}\n  @keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-18px)}}\n  @keyframes pulseGlow{0%,100%{opacity:.5}50%{opacity:.9}}\n  @keyframes dash{to{stroke-dashoffset:-120}}\n  html{scroll-padding-top:80px}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div class=\"awsmod\" style=\"--accent:{{ accent }};--accent2:#a274ff;position:relative;min-height:100vh;background:radial-gradient(1200px 700px at 85% -5%, rgba(79,124,255,.18), transparent 60%),radial-gradient(1000px 600px at 0% 30%, rgba(162,116,255,.14), transparent 55%),linear-gradient(180deg,#070a18 0%,#0a0e22 50%,#080b1a 100%);color:#aeb8d4;overflow:hidden\">\n\n  <div style=\"position:fixed;top:0;left:0;height:3px;width:100%;background:rgba(255,255,255,.06);z-index:120\">\n    <div id=\"awsbar\" style=\"height:100%;width:0%;background:linear-gradient(90deg,var(--accent),var(--accent2));box-shadow:0 0 12px var(--accent);transition:width .1s linear\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ambient blobs -->\n  <div style=\"position:absolute;top:-120px;right:-80px;width:520px;height:520px;border-radius:50%;background:radial-gradient(circle,rgba(79,124,255,.22),transparent 70%);filter:blur(20px);animation:floaty 9s ease-in-out infinite;pointer-events:none\"><\u002Fdiv>\n  <div style=\"position:absolute;top:1100px;left:-140px;width:480px;height:480px;border-radius:50%;background:radial-gradient(circle,rgba(162,116,255,.18),transparent 70%);filter:blur(20px);animation:floaty 11s ease-in-out infinite;pointer-events:none\"><\u002Fdiv>\n\n  <!-- ============ HERO ============ -->\n  <header style=\"position:relative;max-width:1180px;margin:0 auto;padding:120px 32px 70px;text-align:center\">\n    <div style=\"display:inline-flex;align-items:center;gap:10px;padding:8px 18px;border-radius:999px;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04);font-family:'JetBrains Mono',monospace;font-size:12.5px;letter-spacing:.18em;color:#cdd6f5;text-transform:uppercase\">\n      <span style=\"width:8px;height:8px;border-radius:50%;background:#ff9900;box-shadow:0 0 10px #ff9900;animation:pulseGlow 2s infinite\"><\u002Fspan>\n      Lesson 33 · Module tự học\n    <\u002Fdiv>\n    <h1 style=\"margin:30px auto 0;max-width:920px;font-size:clamp(40px,6.6vw,82px);line-height:1.02;font-weight:800;letter-spacing:-.02em;color:#f4f7ff\">\n      AWS <span style=\"background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">Cloud Computing<\u002Fspan> Cơ bản\n    <\u002Fh1>\n    <p style=\"margin:24px auto 0;max-width:680px;font-size:clamp(16px,2vw,20px);line-height:1.6;color:#9aa6c8\">\n      Học nền tảng điện toán đám mây Amazon Web Services từ con số 0 — qua sơ đồ, ví dụ thực tế trong doanh nghiệp và bài lab thực hành.\n    <\u002Fp>\n    <div style=\"margin-top:40px;display:flex;gap:14px;justify-content:center;flex-wrap:wrap\">\n      <a href=\"#intro\" style=\"display:inline-flex;align-items:center;gap:10px;padding:15px 28px;border-radius:14px;background:linear-gradient(120deg,var(--accent),var(--accent2));color:#fff;font-weight:600;font-size:15px;text-decoration:none;box-shadow:0 14px 40px -10px var(--accent)\">Bắt đầu học &nbsp;↓<\u002Fa>\n      <a href=\"#lab\" style=\"display:inline-flex;align-items:center;gap:10px;padding:15px 28px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.14);color:#dde4fa;font-weight:600;font-size:15px;text-decoration:none\">Tới bài Lab thực hành<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"margin-top:46px;display:flex;gap:30px;justify-content:center;flex-wrap:wrap;font-size:13.5px;color:#7e88a8;font-family:'JetBrains Mono',monospace\">\n      <span>✍ Tác giả: <b style=\"color:#cdd6f5\">Yên Nguyễn<\u002Fb><\u002Fspan>\n      <span>🗓 Cập nhật 2025<\u002Fspan>\n      <span>⏱ ~45 phút<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <!-- ============ BODY GRID ============ -->\n  <div style=\"position:relative;max-width:1180px;margin:0 auto;padding:0 32px 40px;display:grid;grid-template-columns:230px 1fr;gap:48px;align-items:start\">\n\n    <!-- TOC -->\n    <aside style=\"position:sticky;top:54px;align-self:start;display:flex;flex-direction:column;gap:6px\">\n      <div style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:#6f7aa0;padding:0 14px 12px\">Mục lục<\u002Fdiv>\n      <a href=\"#intro\" class=\"toc-link\" data-target=\"intro\" style=\"display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:11px;text-decoration:none;color:#9aa6c8;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.6\">01<\u002Fspan> Giới thiệu AWS<\u002Fa>\n      <a href=\"#iam\" class=\"toc-link\" data-target=\"iam\" style=\"display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:11px;text-decoration:none;color:#9aa6c8;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.6\">02<\u002Fspan> IAM — Phân quyền<\u002Fa>\n      <a href=\"#network\" class=\"toc-link\" data-target=\"network\" style=\"display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:11px;text-decoration:none;color:#9aa6c8;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.6\">03<\u002Fspan> Network — Mạng<\u002Fa>\n      <a href=\"#ec2\" class=\"toc-link\" data-target=\"ec2\" style=\"display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:11px;text-decoration:none;color:#9aa6c8;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.6\">04<\u002Fspan> EC2 — Máy chủ ảo<\u002Fa>\n      <a href=\"#storage\" class=\"toc-link\" data-target=\"storage\" style=\"display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:11px;text-decoration:none;color:#9aa6c8;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.6\">05<\u002Fspan> Storage — Lưu trữ<\u002Fa>\n      <a href=\"#lambda\" class=\"toc-link\" data-target=\"lambda\" style=\"display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:11px;text-decoration:none;color:#9aa6c8;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.6\">06<\u002Fspan> Lambda — Serverless<\u002Fa>\n      <a href=\"#lab\" class=\"toc-link\" data-target=\"lab\" style=\"display:flex;gap:12px;align-items:center;padding:11px 14px;border-radius:11px;text-decoration:none;color:#9aa6c8;font-size:14px;font-weight:500;transition:all .2s;border:1px solid transparent\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;opacity:.6\">07<\u002Fspan> LAB thực hành<\u002Fa>\n    <\u002Faside>\n\n    <!-- CONTENT -->\n    <main style=\"display:flex;flex-direction:column;gap:30px;min-width:0\">\n\n      <!-- Objectives -->\n      <section style=\"padding:34px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n        <div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:8px\">Objectives · Mục tiêu<\u002Fdiv>\n        <h2 style=\"font-size:26px;font-weight:700;color:#f4f7ff;margin-bottom:6px\">Bạn sẽ học được gì?<\u002Fh2>\n        <p style=\"font-size:15px;line-height:1.6;color:#9aa6c8;margin-bottom:22px\">5 trụ cột nền tảng của AWS mà bất kỳ kỹ sư cloud nào cũng cần nắm.<\u002Fp>\n        <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px\">\n          <div style=\"padding:18px;border-radius:16px;background:rgba(79,124,255,.08);border:1px solid rgba(79,124,255,.18)\"><div style=\"font-size:22px;margin-bottom:8px\">☁️<\u002Fdiv><div style=\"color:#eaf0ff;font-weight:600;font-size:15px\">Giới thiệu AWS<\u002Fdiv><div style=\"font-size:12.5px;color:#8893b6;margin-top:2px\">Nền tảng đám mây<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px;border-radius:16px;background:rgba(255,153,0,.08);border:1px solid rgba(255,153,0,.2)\"><div style=\"font-size:22px;margin-bottom:8px\">🔐<\u002Fdiv><div style=\"color:#eaf0ff;font-weight:600;font-size:15px\">IAM<\u002Fdiv><div style=\"font-size:12.5px;color:#8893b6;margin-top:2px\">Quản lý truy cập<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px;border-radius:16px;background:rgba(162,116,255,.08);border:1px solid rgba(162,116,255,.2)\"><div style=\"font-size:22px;margin-bottom:8px\">🖥️<\u002Fdiv><div style=\"color:#eaf0ff;font-weight:600;font-size:15px\">EC2<\u002Fdiv><div style=\"font-size:12.5px;color:#8893b6;margin-top:2px\">Máy chủ ảo<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px;border-radius:16px;background:rgba(46,204,153,.08);border:1px solid rgba(46,204,153,.2)\"><div style=\"font-size:22px;margin-bottom:8px\">🗄️<\u002Fdiv><div style=\"color:#eaf0ff;font-weight:600;font-size:15px\">Storage<\u002Fdiv><div style=\"font-size:12.5px;color:#8893b6;margin-top:2px\">Lưu trữ dữ liệu<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:18px;border-radius:16px;background:rgba(255,99,132,.08);border:1px solid rgba(255,99,132,.2)\"><div style=\"font-size:22px;margin-bottom:8px\">⚡<\u002Fdiv><div style=\"color:#eaf0ff;font-weight:600;font-size:15px\">Lambda<\u002Fdiv><div style=\"font-size:12.5px;color:#8893b6;margin-top:2px\">Serverless<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== 01 INTRO ===== -->\n      <section id=\"intro\" data-section=\"\" data-screen-label=\"Giới thiệu AWS\" style=\"scroll-margin-top:70px\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;background:linear-gradient(160deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">01<\u002Fspan>\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)\">Introduction<\u002Fdiv><h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">Giới thiệu AWS<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n          <p style=\"font-size:16.5px;line-height:1.75;color:#c2cbe6\">\n            <b style=\"color:#fff\">Amazon Web Services (AWS)<\u002Fb> là một nền tảng <b style=\"color:var(--accent)\">đám mây (cloud)<\u002Fb> toàn cầu do Amazon cung cấp, với hàng trăm dịch vụ giúp doanh nghiệp <b style=\"color:#fff\">triển khai, quản lý và mở rộng<\u002Fb> hệ thống một cách dễ dàng và linh hoạt — từ tính toán, lưu trữ, mạng cho đến Machine Learning &amp; AI.\n          <\u002Fp>\n\n          <!-- analogy: traditional vs cloud -->\n          <div style=\"margin-top:26px;display:grid;grid-template-columns:1fr auto 1fr;gap:16px;align-items:center\">\n            <div style=\"padding:22px;border-radius:18px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\">\n              <div style=\"font-size:13px;font-family:'JetBrains Mono',monospace;color:#8893b6;margin-bottom:10px\">CÁCH CŨ · On-premise<\u002Fdiv>\n              <div style=\"font-size:30px;margin-bottom:8px\">🏢🔌💸<\u002Fdiv>\n              <div style=\"color:#dde4fa;font-weight:600;font-size:15px;margin-bottom:6px\">Tự mua &amp; vận hành server<\u002Fdiv>\n              <ul style=\"list-style:none;display:flex;flex-direction:column;gap:6px;font-size:13.5px;color:#8893b6\">\n                <li>· Tốn chi phí đầu tư ban đầu lớn<\u002Fli>\n                <li>· Mất tuần để lắp đặt<\u002Fli>\n                <li>· Khó mở rộng khi đông user<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n            <div style=\"font-size:30px;color:var(--accent)\">→<\u002Fdiv>\n            <div style=\"padding:22px;border-radius:18px;background:rgba(79,124,255,.08);border:1px solid rgba(79,124,255,.22)\">\n              <div style=\"font-size:13px;font-family:'JetBrains Mono',monospace;color:var(--accent);margin-bottom:10px\">CÁCH MỚI · Cloud (AWS)<\u002Fdiv>\n              <div style=\"font-size:30px;margin-bottom:8px\">☁️⚡✅<\u002Fdiv>\n              <div style=\"color:#fff;font-weight:600;font-size:15px;margin-bottom:6px\">Thuê tài nguyên qua mạng<\u002Fdiv>\n              <ul style=\"list-style:none;display:flex;flex-direction:column;gap:6px;font-size:13.5px;color:#aeb8d4\">\n                <li>· Trả tiền theo mức dùng (pay-as-you-go)<\u002Fli>\n                <li>· Bật server trong vài phút<\u002Fli>\n                <li>· Tự co giãn theo lượng truy cập<\u002Fli>\n              <\u002Ful>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- real AWS services diagram (from source) -->\n          <figure style=\"margin-top:26px;border-radius:18px;overflow:hidden;background:#f4f6fb;border:1px solid rgba(255,255,255,.08)\">\n            <img src=\"18651f37-ce8c-40ba-9455-710489dfebb3\" alt=\"Các dịch vụ AWS\" style=\"width:100%;display:block\">\n            <figcaption style=\"padding:12px 16px;font-size:12.5px;color:#64708f;background:#eef1f8;font-family:'JetBrains Mono',monospace\">Hệ sinh thái dịch vụ AWS: EC2, S3, RDS, VPC, Route 53, EBS…<\u002Ffigcaption>\n          <\u002Ffigure>\n\n          <!-- example -->\n          <div style=\"margin-top:24px;padding:22px;border-radius:18px;background:linear-gradient(135deg,rgba(255,153,0,.1),rgba(255,153,0,.03));border:1px solid rgba(255,153,0,.22)\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:#ff9900;color:#1a1205;font-size:16px\">💡<\u002Fspan><b style=\"color:#ffd591;font-size:14px;letter-spacing:.02em\">VÍ DỤ THỰC TẾ<\u002Fb><\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.7;color:#e8d9bf\">Một <b style=\"color:#fff\">startup bán hàng online<\u002Fb> ngày thường có 100 khách, nhưng ngày sale 11/11 tăng lên 50.000 khách. Thay vì mua sẵn 50 server (lãng phí 364 ngày còn lại), họ dùng AWS để <b style=\"color:#ffce85\">tự động bật thêm server<\u002Fb> đúng ngày cao điểm, rồi tắt bớt khi hết sale — chỉ trả tiền cho đúng phần đã dùng.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== 02 IAM ===== -->\n      <section id=\"iam\" data-section=\"\" data-screen-label=\"IAM\" style=\"scroll-margin-top:70px\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;background:linear-gradient(160deg,#ff9900,#ffce85);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">02<\u002Fspan>\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#ff9900\">Identity &amp; Access Management<\u002Fdiv><h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">IAM — Quản lý truy cập<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n          <p style=\"font-size:16.5px;line-height:1.75;color:#c2cbe6\"><b style=\"color:#fff\">AWS IAM (Identity and Access Management)<\u002Fb> là dịch vụ giúp kiểm soát <b style=\"color:#ff9900\">ai được truy cập<\u002Fb>, <b style=\"color:#ff9900\">làm được gì<\u002Fb>, và <b style=\"color:#ff9900\">trong điều kiện nào<\u002Fb> với tài nguyên AWS. Đây là lớp bảo mật nền tảng, giúp phân quyền linh hoạt và bảo vệ tài nguyên đúng cách.<\u002Fp>\n\n          <figure style=\"margin-top:24px;border-radius:18px;overflow:hidden;border:1px solid rgba(255,255,255,.08);background:#e9ebf0\">\n            <img src=\"e705f452-8bdf-4b64-b3fa-e03c5240f1f1\" alt=\"Sơ đồ AWS IAM\" style=\"width:100%;display:block\">\n          <\u002Ffigure>\n\n          <div style=\"margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n            <div style=\"padding:20px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\">\n              <div style=\"font-size:24px;margin-bottom:10px\">👤<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px;margin-bottom:4px\">Users<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.55;color:#8893b6\">Một người dùng cụ thể — nhân viên, quản trị viên hoặc người dùng cuối.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:20px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\">\n              <div style=\"font-size:24px;margin-bottom:10px\">👥<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px;margin-bottom:4px\">Groups<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.55;color:#8893b6\">Tập hợp user có chung quyền để quản lý dễ hơn (vd: nhóm admin, nhóm dev).<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:20px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\">\n              <div style=\"font-size:24px;margin-bottom:10px\">🎭<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px;margin-bottom:4px\">Roles<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.55;color:#8893b6\">Vai trò gán quyền tạm thời cho dịch vụ/user mà không cần mật khẩu riêng.<\u002Fdiv><\u002Fdiv>\n            <div style=\"padding:20px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\">\n              <div style=\"font-size:24px;margin-bottom:10px\">📜<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px;margin-bottom:4px\">Policies<\u002Fdiv><div style=\"font-size:13.5px;line-height:1.55;color:#8893b6\">Bộ quy tắc (JSON) xác định được phép / từ chối hành động nào trên tài nguyên.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;padding:22px;border-radius:18px;background:linear-gradient(135deg,rgba(255,153,0,.1),rgba(255,153,0,.03));border:1px solid rgba(255,153,0,.22)\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:#ff9900;color:#1a1205;font-size:16px\">💡<\u002Fspan><b style=\"color:#ffd591;font-size:14px;letter-spacing:.02em\">VÍ DỤ THỰC TẾ<\u002Fb><\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.7;color:#e8d9bf\">Công ty có 3 lập trình viên mới. Thay vì cấp quyền từng người, admin tạo <b style=\"color:#fff\">Group \"Developers\"<\u002Fb> gắn <b style=\"color:#ffce85\">Policy<\u002Fb> \"chỉ được đọc/ghi vào database test, không được đụng vào server thật\". Thêm cả 3 vào group là xong — sau này 1 người nghỉ thì chỉ cần xoá user đó.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== 03 NETWORK ===== -->\n      <section id=\"network\" data-section=\"\" data-screen-label=\"Network\" style=\"scroll-margin-top:70px\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;background:linear-gradient(160deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">03<\u002Fspan>\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)\">Network Service<\u002Fdiv><h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">Network — Dịch vụ mạng<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n          <p style=\"font-size:16.5px;line-height:1.75;color:#c2cbe6\">AWS cung cấp các dịch vụ mạng giúp <b style=\"color:#fff\">kết nối tài nguyên<\u002Fb> và triển khai hệ thống phân tán <b style=\"color:var(--accent)\">an toàn<\u002Fb>.<\u002Fp>\n\n          <!-- VPC diagram -->\n          <div style=\"margin-top:24px;border-radius:18px;background:rgba(8,12,28,.6);border:1px solid rgba(255,255,255,.08);padding:24px\">\n            <svg viewBox=\"0 0 760 360\" style=\"width:100%;height:auto;font-family:'JetBrains Mono',monospace\">\n              <defs><marker id=\"arr\" markerWidth=\"9\" markerHeight=\"9\" refX=\"7\" refY=\"3\" orient=\"auto\"><path d=\"M0,0 L7,3 L0,6 Z\" fill=\"#6f86d6\"><\u002Fpath><\u002Fmarker><\u002Fdefs>\n              <!-- AWS cloud -->\n              <rect x=\"190\" y=\"20\" width=\"550\" height=\"320\" rx=\"16\" fill=\"rgba(79,124,255,.05)\" stroke=\"rgba(79,124,255,.4)\" stroke-dasharray=\"6 5\"><\u002Frect>\n              <text x=\"210\" y=\"46\" fill=\"#7fa0ff\" font-size=\"13\">☁ AWS Cloud — Region<\u002Ftext>\n              <!-- VPC -->\n              <rect x=\"220\" y=\"60\" width=\"490\" height=\"250\" rx=\"12\" fill=\"rgba(162,116,255,.06)\" stroke=\"rgba(162,116,255,.45)\"><\u002Frect>\n              <text x=\"238\" y=\"84\" fill=\"#bfa3ff\" font-size=\"13\">Amazon VPC · 10.0.0.0/16<\u002Ftext>\n              <!-- public subnet -->\n              <rect x=\"248\" y=\"100\" width=\"200\" height=\"180\" rx=\"10\" fill=\"rgba(46,204,153,.07)\" stroke=\"rgba(46,204,153,.4)\"><\u002Frect>\n              <text x=\"262\" y=\"122\" fill=\"#5fe3b5\" font-size=\"12\">Public Subnet<\u002Ftext>\n              <rect x=\"278\" y=\"140\" width=\"140\" height=\"56\" rx=\"9\" fill=\"rgba(255,153,0,.14)\" stroke=\"#ff9900\"><\u002Frect>\n              <text x=\"348\" y=\"166\" fill=\"#ffce85\" font-size=\"12\" text-anchor=\"middle\">🖥 EC2<\u002Ftext>\n              <text x=\"348\" y=\"182\" fill=\"#cdb38a\" font-size=\"10\" text-anchor=\"middle\">Web server<\u002Ftext>\n              <!-- private subnet -->\n              <rect x=\"476\" y=\"100\" width=\"210\" height=\"180\" rx=\"10\" fill=\"rgba(79,124,255,.07)\" stroke=\"rgba(79,124,255,.4)\"><\u002Frect>\n              <text x=\"490\" y=\"122\" fill=\"#7fa0ff\" font-size=\"12\">Private Subnet<\u002Ftext>\n              <rect x=\"512\" y=\"140\" width=\"140\" height=\"56\" rx=\"9\" fill=\"rgba(255,99,132,.14)\" stroke=\"#ff6384\"><\u002Frect>\n              <text x=\"582\" y=\"166\" fill=\"#ffadc0\" font-size=\"12\" text-anchor=\"middle\">🗄 Database<\u002Ftext>\n              <text x=\"582\" y=\"182\" fill=\"#d39aa8\" font-size=\"10\" text-anchor=\"middle\">Không ra Internet<\u002Ftext>\n              <line x1=\"418\" y1=\"168\" x2=\"510\" y2=\"168\" stroke=\"#6f86d6\" stroke-width=\"2\" marker-end=\"url(#arr)\"><\u002Fline>\n              <!-- Route53 -->\n              <rect x=\"30\" y=\"60\" width=\"130\" height=\"56\" rx=\"9\" fill=\"rgba(255,255,255,.05)\" stroke=\"rgba(255,255,255,.18)\"><\u002Frect>\n              <text x=\"95\" y=\"84\" fill=\"#dde4fa\" font-size=\"12\" text-anchor=\"middle\">🌐 Route 53<\u002Ftext>\n              <text x=\"95\" y=\"100\" fill=\"#8893b6\" font-size=\"10\" text-anchor=\"middle\">DNS<\u002Ftext>\n              <line x1=\"160\" y1=\"120\" x2=\"276\" y2=\"150\" stroke=\"#6f86d6\" stroke-width=\"2\" marker-end=\"url(#arr)\"><\u002Fline>\n              <!-- on-premise / direct connect -->\n              <rect x=\"30\" y=\"200\" width=\"130\" height=\"56\" rx=\"9\" fill=\"rgba(255,255,255,.05)\" stroke=\"rgba(255,255,255,.18)\"><\u002Frect>\n              <text x=\"95\" y=\"224\" fill=\"#dde4fa\" font-size=\"12\" text-anchor=\"middle\">🏢 On-premise<\u002Ftext>\n              <text x=\"95\" y=\"240\" fill=\"#8893b6\" font-size=\"10\" text-anchor=\"middle\">Văn phòng<\u002Ftext>\n              <line x1=\"160\" y1=\"228\" x2=\"246\" y2=\"200\" stroke=\"#6f86d6\" stroke-width=\"2\" stroke-dasharray=\"5 4\" marker-end=\"url(#arr)\"><\u002Fline>\n              <text x=\"172\" y=\"186\" fill=\"#9aa6c8\" font-size=\"10\">Direct Connect<\u002Ftext>\n            <\u002Fsvg>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;display:flex;flex-direction:column;gap:12px\">\n            <div style=\"padding:16px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><b style=\"color:#fff\">Amazon VPC<\u002Fb> <span style=\"color:#8893b6;font-size:14px\">— mạng riêng ảo, kiểm soát tài nguyên trên cloud với nhiều lớp bảo mật.<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:16px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><b style=\"color:#fff\">AWS Direct Connect<\u002Fb> <span style=\"color:#8893b6;font-size:14px\">— kết nối trực tiếp từ hạ tầng của bạn đến AWS, tăng băng thông, giảm độ trễ.<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:16px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><b style=\"color:#fff\">AWS Route 53<\u002Fb> <span style=\"color:#8893b6;font-size:14px\">— dịch vụ DNS, điều hướng lưu lượng tới tài nguyên AWS hoặc dịch vụ bên ngoài.<\u002Fspan><\u002Fdiv>\n            <div style=\"padding:16px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><b style=\"color:#fff\">AWS Transit Gateway<\u002Fb> <span style=\"color:#8893b6;font-size:14px\">— kết nối nhiều VPC và data center on-premise thành một mạng tập trung.<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;padding:22px;border-radius:18px;background:linear-gradient(135deg,rgba(79,124,255,.1),rgba(79,124,255,.03));border:1px solid rgba(79,124,255,.22)\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;font-size:16px\">💡<\u002Fspan><b style=\"color:#bcd0ff;font-size:14px;letter-spacing:.02em\">VÍ DỤ THỰC TẾ<\u002Fb><\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.7;color:#cdd9f5\">Một web bán hàng đặt <b style=\"color:#fff\">trang web ở Public Subnet<\u002Fb> (khách truy cập được qua Internet), còn <b style=\"color:#fff\">database ở Private Subnet<\u002Fb> (chỉ web server gọi tới, hacker bên ngoài không chạm được). Route 53 lo việc gõ <i>tenmiencuaban.com<\u002Fi> ra đúng server.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== 04 EC2 ===== -->\n      <section id=\"ec2\" data-section=\"\" data-screen-label=\"EC2\" style=\"scroll-margin-top:70px\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;background:linear-gradient(160deg,var(--accent2),var(--accent));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">04<\u002Fspan>\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent2)\">Elastic Compute Cloud<\u002Fdiv><h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">EC2 — Máy chủ ảo<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n          <p style=\"font-size:16.5px;line-height:1.75;color:#c2cbe6\"><b style=\"color:#fff\">Amazon EC2 (Elastic Compute Cloud)<\u002Fb> cung cấp các <b style=\"color:var(--accent2)\">máy chủ ảo (instances)<\u002Fb> trên đám mây. Bạn có thể tạo, cấu hình và quản lý máy chủ theo nhu cầu chỉ trong vài phút.<\u002Fp>\n\n          <div style=\"margin-top:24px;display:grid;grid-template-columns:1fr 1fr;gap:14px\">\n            <div style=\"padding:22px;border-radius:16px;background:rgba(162,116,255,.07);border:1px solid rgba(162,116,255,.2)\">\n              <div style=\"font-size:22px;margin-bottom:10px\">⚙️<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px;margin-bottom:6px\">Đa dạng loại instance<\u002Fdiv><p style=\"font-size:13.5px;line-height:1.55;color:#9aa6c8\">Tối ưu cho tính toán, bộ nhớ, lưu trữ hoặc đồ hoạ — chọn đúng loại cho từng công việc.<\u002Fp><\u002Fdiv>\n            <div style=\"padding:22px;border-radius:16px;background:rgba(162,116,255,.07);border:1px solid rgba(162,116,255,.2)\">\n              <div style=\"font-size:22px;margin-bottom:10px\">🛡️<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px;margin-bottom:6px\">Tuỳ chỉnh bảo mật<\u002Fdiv><p style=\"font-size:13.5px;line-height:1.55;color:#9aa6c8\">Dùng Security Groups &amp; IAM để kiểm soát chính xác ai được truy cập vào instance.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:18px;display:flex;gap:10px;flex-wrap:wrap\">\n            <span style=\"padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-family:'JetBrains Mono',monospace;font-size:13px;color:#cdd6f5\">t3 · cân bằng<\u002Fspan>\n            <span style=\"padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-family:'JetBrains Mono',monospace;font-size:13px;color:#cdd6f5\">c5 · tính toán<\u002Fspan>\n            <span style=\"padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-family:'JetBrains Mono',monospace;font-size:13px;color:#cdd6f5\">r5 · bộ nhớ lớn<\u002Fspan>\n            <span style=\"padding:9px 16px;border-radius:999px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);font-family:'JetBrains Mono',monospace;font-size:13px;color:#cdd6f5\">g4 · đồ hoạ/GPU<\u002Fspan>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;padding:22px;border-radius:18px;background:linear-gradient(135deg,rgba(162,116,255,.1),rgba(162,116,255,.03));border:1px solid rgba(162,116,255,.22)\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:var(--accent2);color:#fff;font-size:16px\">💡<\u002Fspan><b style=\"color:#d8c4ff;font-size:14px;letter-spacing:.02em\">VÍ DỤ THỰC TẾ<\u002Fb><\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.7;color:#ddd2f5\">Bạn cần chạy một website WordPress. Thay vì mua máy chủ vật lý, bạn bật một <b style=\"color:#fff\">EC2 instance t3.small<\u002Fb>, cài WordPress, gắn tên miền — website online sau 10 phút. Khi traffic tăng, bạn chỉ việc đổi sang instance mạnh hơn.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== 05 STORAGE ===== -->\n      <section id=\"storage\" data-section=\"\" data-screen-label=\"Storage\" style=\"scroll-margin-top:70px\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;background:linear-gradient(160deg,#2ecc99,#5fe3b5);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">05<\u002Fspan>\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#2ecc99\">Storage Services<\u002Fdiv><h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">Storage — Lưu trữ<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n          <p style=\"font-size:16.5px;line-height:1.75;color:#c2cbe6\">AWS cung cấp một hệ sinh thái lưu trữ phong phú — mỗi dịch vụ phù hợp với một kiểu dữ liệu khác nhau.<\u002Fp>\n\n          <div style=\"margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px\">\n            <div style=\"padding:22px;border-radius:16px;background:rgba(46,204,153,.07);border:1px solid rgba(46,204,153,.2)\"><div style=\"font-size:24px;margin-bottom:8px\">🪣<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px\">Amazon S3<\u002Fdiv><div style=\"font-size:12px;color:#5fe3b5;font-family:'JetBrains Mono',monospace;margin:3px 0 8px\">Object Storage<\u002Fdiv><p style=\"font-size:13px;line-height:1.55;color:#9aa6c8\">Lưu &amp; truy xuất dữ liệu mọi lúc mọi nơi. Hợp với dữ liệu lớn: ảnh, video, backup.<\u002Fp><\u002Fdiv>\n            <div style=\"padding:22px;border-radius:16px;background:rgba(46,204,153,.07);border:1px solid rgba(46,204,153,.2)\"><div style=\"font-size:24px;margin-bottom:8px\">💽<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px\">Amazon EBS<\u002Fdiv><div style=\"font-size:12px;color:#5fe3b5;font-family:'JetBrains Mono',monospace;margin:3px 0 8px\">Block Storage<\u002Fdiv><p style=\"font-size:13px;line-height:1.55;color:#9aa6c8\">Ổ đĩa gắn vào EC2, tốc độ nhanh, độ bền cao — như ổ cứng của máy ảo.<\u002Fp><\u002Fdiv>\n            <div style=\"padding:22px;border-radius:16px;background:rgba(46,204,153,.07);border:1px solid rgba(46,204,153,.2)\"><div style=\"font-size:24px;margin-bottom:8px\">📂<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px\">Amazon EFS<\u002Fdiv><div style=\"font-size:12px;color:#5fe3b5;font-family:'JetBrains Mono',monospace;margin:3px 0 8px\">File System<\u002Fdiv><p style=\"font-size:13px;line-height:1.55;color:#9aa6c8\">Hệ thống tệp dùng chung cho nhiều EC2 cùng lúc — hợp khi cần chia sẻ dữ liệu.<\u002Fp><\u002Fdiv>\n            <div style=\"padding:22px;border-radius:16px;background:rgba(46,204,153,.07);border:1px solid rgba(46,204,153,.2)\"><div style=\"font-size:24px;margin-bottom:8px\">🧊<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:16px\">AWS Glacier<\u002Fdiv><div style=\"font-size:12px;color:#5fe3b5;font-family:'JetBrains Mono',monospace;margin:3px 0 8px\">Archive<\u002Fdiv><p style=\"font-size:13px;line-height:1.55;color:#9aa6c8\">Lưu trữ dài hạn, ít truy cập, chi phí cực thấp — như \"kho lạnh\" cho dữ liệu cũ.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- cost vs access chart -->\n          <div style=\"margin-top:24px;border-radius:18px;background:rgba(8,12,28,.6);border:1px solid rgba(255,255,255,.08);padding:24px\">\n            <div style=\"font-size:12.5px;font-family:'JetBrains Mono',monospace;color:#8893b6;margin-bottom:16px\">SO SÁNH · Tần suất truy cập ↔ Chi phí lưu trữ<\u002Fdiv>\n            <div style=\"display:flex;flex-direction:column;gap:14px\">\n              <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"width:90px;font-size:13px;color:#dde4fa;flex-shrink:0\">S3 / EBS<\u002Fspan><div style=\"flex:1;height:14px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden\"><div style=\"height:100%;width:92%;background:linear-gradient(90deg,#2ecc99,#5fe3b5);border-radius:8px\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:12px;color:#8893b6;width:120px;flex-shrink:0\">Truy cập liên tục · giá cao hơn<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"width:90px;font-size:13px;color:#dde4fa;flex-shrink:0\">EFS<\u002Fspan><div style=\"flex:1;height:14px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden\"><div style=\"height:100%;width:60%;background:linear-gradient(90deg,#2ecc99,#5fe3b5);border-radius:8px\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:12px;color:#8893b6;width:120px;flex-shrink:0\">Dùng chung · trung bình<\u002Fspan><\u002Fdiv>\n              <div style=\"display:flex;align-items:center;gap:14px\"><span style=\"width:90px;font-size:13px;color:#dde4fa;flex-shrink:0\">Glacier<\u002Fspan><div style=\"flex:1;height:14px;border-radius:8px;background:rgba(255,255,255,.06);overflow:hidden\"><div style=\"height:100%;width:18%;background:linear-gradient(90deg,#4f7cff,#7fa0ff);border-radius:8px\"><\u002Fdiv><\u002Fdiv><span style=\"font-size:12px;color:#8893b6;width:120px;flex-shrink:0\">Hiếm khi truy cập · rẻ nhất<\u002Fspan><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;padding:22px;border-radius:18px;background:linear-gradient(135deg,rgba(46,204,153,.1),rgba(46,204,153,.03));border:1px solid rgba(46,204,153,.22)\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:#2ecc99;color:#04231a;font-size:16px\">💡<\u002Fspan><b style=\"color:#9af0cf;font-size:14px;letter-spacing:.02em\">VÍ DỤ THỰC TẾ<\u002Fb><\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.7;color:#cdeede\">Một <b style=\"color:#fff\">app chia sẻ ảnh<\u002Fb>: ảnh người dùng tải lên lưu ở <b style=\"color:#7af0c8\">S3<\u002Fb>; ổ đĩa hệ điều hành của server nằm trên <b style=\"color:#7af0c8\">EBS<\u002Fb>; ảnh trên 2 năm không ai xem được chuyển sang <b style=\"color:#7af0c8\">Glacier<\u002Fb> để tiết kiệm 80% chi phí.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== 06 LAMBDA ===== -->\n      <section id=\"lambda\" data-section=\"\" data-screen-label=\"Lambda\" style=\"scroll-margin-top:70px\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;background:linear-gradient(160deg,#ff6384,#ffadc0);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">06<\u002Fspan>\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#ff6384\">Serverless<\u002Fdiv><h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">Lambda — Chạy code không cần server<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n          <p style=\"font-size:16.5px;line-height:1.75;color:#c2cbe6\"><b style=\"color:#fff\">AWS Lambda<\u002Fb> là dịch vụ <b style=\"color:#ff6384\">serverless<\u002Fb> cho phép chạy mã mà <b style=\"color:#fff\">không cần quản lý máy chủ<\u002Fb>. Bạn chỉ viết hàm, AWS lo phần còn lại.<\u002Fp>\n\n          <!-- flow diagram -->\n          <div style=\"margin-top:24px;border-radius:18px;background:rgba(8,12,28,.6);border:1px solid rgba(255,255,255,.08);padding:30px 24px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap\">\n            <div style=\"text-align:center\"><div style=\"width:110px;height:84px;border-radius:14px;background:rgba(255,153,0,.12);border:1px solid #ff9900;display:grid;place-items:center;font-size:30px\">📤<\u002Fdiv><div style=\"margin-top:8px;font-size:12.5px;color:#dde4fa\">Sự kiện<br><span style=\"color:#8893b6\">(upload ảnh)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"color:#ff6384;font-size:26px;margin:0 4px\">→<\u002Fdiv>\n            <div style=\"text-align:center\"><div style=\"width:110px;height:84px;border-radius:14px;background:rgba(255,99,132,.14);border:1px solid #ff6384;display:grid;place-items:center;font-size:30px;box-shadow:0 0 24px -6px #ff6384\">λ<\u002Fdiv><div style=\"margin-top:8px;font-size:12.5px;color:#dde4fa\">Lambda chạy<br><span style=\"color:#8893b6\">(tự bật)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div style=\"color:#ff6384;font-size:26px;margin:0 4px\">→<\u002Fdiv>\n            <div style=\"text-align:center\"><div style=\"width:110px;height:84px;border-radius:14px;background:rgba(46,204,153,.12);border:1px solid #2ecc99;display:grid;place-items:center;font-size:30px\">✅<\u002Fdiv><div style=\"margin-top:8px;font-size:12.5px;color:#dde4fa\">Kết quả<br><span style=\"color:#8893b6\">(ảnh thu nhỏ)<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px\">\n            <div style=\"padding:20px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><div style=\"font-size:22px;margin-bottom:8px\">🎯<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:15px;margin-bottom:4px\">Linh hoạt<\u002Fdiv><p style=\"font-size:13px;color:#8893b6;line-height:1.5\">Chạy theo sự kiện / trigger, không cần thiết lập máy chủ.<\u002Fp><\u002Fdiv>\n            <div style=\"padding:20px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><div style=\"font-size:22px;margin-bottom:8px\">📈<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:15px;margin-bottom:4px\">Tự động scale<\u002Fdiv><p style=\"font-size:13px;color:#8893b6;line-height:1.5\">Tự co giãn để xử lý khi lượng công việc tăng cao.<\u002Fp><\u002Fdiv>\n            <div style=\"padding:20px;border-radius:16px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><div style=\"font-size:22px;margin-bottom:8px\">💰<\u002Fdiv><div style=\"color:#fff;font-weight:600;font-size:15px;margin-bottom:4px\">Tối ưu chi phí<\u002Fdiv><p style=\"font-size:13px;color:#8893b6;line-height:1.5\">Chỉ trả tiền theo thời gian hàm chạy, không trả phí lúc chờ.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div style=\"margin-top:24px;padding:22px;border-radius:18px;background:linear-gradient(135deg,rgba(255,99,132,.1),rgba(255,99,132,.03));border:1px solid rgba(255,99,132,.22)\">\n            <div style=\"display:flex;align-items:center;gap:10px;margin-bottom:10px\"><span style=\"display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:#ff6384;color:#2a0810;font-size:16px\">💡<\u002Fspan><b style=\"color:#ffb3c4;font-size:14px;letter-spacing:.02em\">VÍ DỤ THỰC TẾ<\u002Fb><\u002Fdiv>\n            <p style=\"font-size:15px;line-height:1.7;color:#f5d2da\">Mỗi khi người dùng <b style=\"color:#fff\">tải ảnh lên S3<\u002Fb>, một hàm Lambda tự động chạy để tạo bản <b style=\"color:#ffadc0\">ảnh thu nhỏ (thumbnail)<\u002Fb>. Không cần server bật 24/7 — chỉ tốn vài mili-giây xử lý mỗi lần có ảnh mới.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- ===== 07 LAB ===== -->\n      <section id=\"lab\" data-section=\"\" data-screen-label=\"LAB\" style=\"scroll-margin-top:70px\">\n        <div style=\"display:flex;align-items:baseline;gap:16px;margin-bottom:18px\">\n          <span style=\"font-family:'JetBrains Mono',monospace;font-size:48px;font-weight:700;line-height:1;background:linear-gradient(160deg,var(--accent),#ff9900);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent\">07<\u002Fspan>\n          <div><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--accent)\">Hands-on<\u002Fdiv><h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">LAB — Thực hành<\u002Fh2><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:32px;border-radius:24px;border:1px solid rgba(255,255,255,.09);background:linear-gradient(180deg,rgba(255,255,255,.045),rgba(255,255,255,.015))\">\n          <p style=\"font-size:15px;line-height:1.6;color:#9aa6c8;margin-bottom:22px\">Làm theo thứ tự dưới đây để ghép tất cả các dịch vụ đã học thành một hệ thống hoàn chỉnh.<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <div style=\"display:flex;gap:16px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:14px\">1<\u002Fspan><div><b style=\"color:#fff;font-size:15px\">Tạo VPC, Subnet, NACL<\u002Fb><div style=\"font-size:13px;color:#8893b6;margin-top:2px\">Dựng nền tảng mạng riêng cho hệ thống.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:14px\">2<\u002Fspan><div><b style=\"color:#fff;font-size:15px\">Tạo User, Role (IAM)<\u002Fb><div style=\"font-size:13px;color:#8893b6;margin-top:2px\">Thiết lập phân quyền truy cập an toàn.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:14px\">3<\u002Fspan><div><b style=\"color:#fff;font-size:15px\">Tạo EC2 + Security Group<\u002Fb><div style=\"font-size:13px;color:#8893b6;margin-top:2px\">Bật máy chủ ảo và cấu hình tường lửa.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:14px\">4<\u002Fspan><div><b style=\"color:#fff;font-size:15px\">Tạo EBS &amp; gắn vào EC2<\u002Fb><div style=\"font-size:13px;color:#8893b6;margin-top:2px\">Thêm ổ đĩa lưu trữ cho máy chủ.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:14px\">5<\u002Fspan><div><b style=\"color:#fff;font-size:15px\">S3: tạo bucket, upload, phân quyền<\u002Fb><div style=\"font-size:13px;color:#8893b6;margin-top:2px\">Truy cập S3 bằng AWS CLI, upload file và set quyền.<\u002Fdiv><div style=\"margin-top:10px;font-family:'JetBrains Mono',monospace;font-size:12.5px;color:#9af0cf;background:#070b1a;border:1px solid rgba(46,204,153,.25);border-radius:10px;padding:10px 14px\">$ aws s3 mb s3://my-first-bucket<br>$ aws s3 cp ./file.txt s3://my-first-bucket/<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex;gap:16px;align-items:flex-start;padding:18px 20px;border-radius:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08)\"><span style=\"flex-shrink:0;width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:700;display:grid;place-items:center;font-family:'JetBrains Mono',monospace;font-size:14px\">6<\u002Fspan><div><b style=\"color:#fff;font-size:15px\">Tạo hàm Lambda<\u002Fb><div style=\"font-size:13px;color:#8893b6;margin-top:2px\">Viết hàm chạy tự động theo sự kiện.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <!-- Q&A / close -->\n      <section style=\"margin-top:8px;padding:48px 32px;border-radius:24px;text-align:center;border:1px solid rgba(255,255,255,.09);background:radial-gradient(600px 300px at 50% 0%,rgba(79,124,255,.16),transparent 70%),linear-gradient(180deg,rgba(255,255,255,.04),rgba(255,255,255,.01))\">\n        <div style=\"font-size:42px;margin-bottom:10px\">🎓<\u002Fdiv>\n        <h2 style=\"font-size:30px;font-weight:700;color:#f4f7ff\">Q &amp; A<\u002Fh2>\n        <p style=\"margin:12px auto 0;max-width:520px;font-size:15px;color:#9aa6c8;line-height:1.6\">Bạn đã đi qua 5 trụ cột nền tảng của AWS. Hãy thử bắt tay vào bài Lab để biến lý thuyết thành kỹ năng thật.<\u002Fp>\n        <a href=\"#intro\" style=\"display:inline-flex;margin-top:24px;padding:13px 26px;border-radius:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);color:#dde4fa;font-weight:600;font-size:14px;text-decoration:none\">↑ Xem lại từ đầu<\u002Fa>\n      <\u002Fsection>\n\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- footer -->\n  <footer style=\"position:relative;border-top:1px solid rgba(255,255,255,.07);margin-top:40px;padding:34px 32px;text-align:center\">\n    <div style=\"font-weight:700;color:#dde4fa;font-size:15px;letter-spacing:.01em\">Module học AWS Basic · Cloud Computing<\u002Fdiv>\n    <div style=\"margin-top:8px;font-size:13px;color:#7e88a8;font-family:'JetBrains Mono',monospace\">Tác giả: Yên Nguyễn &nbsp;·&nbsp; © Yên Nguyễn — All Rights Reserved<\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:900},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;default&quot;:&quot;#4f7cff&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;options&quot;:[&quot;#4f7cff&quot;,&quot;#7c5cff&quot;,&quot;#00b4d8&quot;,&quot;#2ecc99&quot;],&quot;section&quot;:&quot;Giao diện&quot;}}\">\nclass Component extends DCLogic {\n  componentDidMount(){\n    const root = this.el || document;\n    const bar = document.getElementById('awsbar');\n    const onScroll = () => {\n      const h = document.documentElement;\n      const max = h.scrollHeight - h.clientHeight;\n      const pct = max > 0 ? (h.scrollTop / max) * 100 : 0;\n      if (bar) bar.style.width = pct + '%';\n    };\n    window.addEventListener('scroll', onScroll, {passive:true});\n    onScroll();\n    this._onScroll = onScroll;\n\n    const links = [...document.querySelectorAll('.toc-link')];\n    const setActive = (id) => {\n      links.forEach(l => {\n        const on = l.getAttribute('data-target') === id;\n        l.style.background = on ? 'linear-gradient(120deg,rgba(79,124,255,.18),rgba(162,116,255,.14))' : 'transparent';\n        l.style.color = on ? '#fff' : '#9aa6c8';\n        l.style.borderColor = on ? 'rgba(120,150,255,.3)' : 'transparent';\n      });\n    };\n    const sections = [...document.querySelectorAll('[data-section]')];\n    if ('IntersectionObserver' in window) {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) setActive(e.target.id); });\n      }, {rootMargin:'-45% 0px -50% 0px', threshold:0});\n      sections.forEach(s => io.observe(s));\n      this._io = io;\n    }\n    if (sections[0]) setActive(sections[0].id);\n  }\n  componentWillUnmount(){\n    if (this._onScroll) window.removeEventListener('scroll', this._onScroll);\n    if (this._io) this._io.disconnect();\n  }\n  renderVals(){\n    return { accent: this.props.accent ?? '#4f7cff' };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
